apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Values.mysql.name }}
spec:
  selector:
    matchLabels:
      app: mysql   

  serviceName: "{{ .Values.serviceName }}"  

  replicas: {{ .Values.replicaCount }}
  minReadySeconds: {{ .Values.minReadySeconds }}

  template:
    metadata:
      labels:
        app: mysql   

    spec:
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}

      containers:
      - name: mysql
        image: {{ .Values.mysqlImagename }}

        ports:
        - containerPort: {{ .Values.ports.containerPort }}
          name: mysql

        resources:
          limits:
            memory: "512Mi"
            cpu: "200m"
          requests:
            memory: "256Mi"
            cpu: "100m"

        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: MYSQL_ROOT_PASSWORD

        - name: MYSQL_USER
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: MYSQL_USER

        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: MYSQL_PASSWORD

        volumeMounts:
        - name: likhitha-data
          mountPath: /var/lib/mysql

  volumeClaimTemplates:
  - metadata:
      name: likhitha-data
    spec:
      accessModes: ["ReadWriteMany"]
      storageClassName: duniversity-storage
      resources:
        requests:
          storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-service
spec:
  selector:
    app: mysql
  ports:
    - protocol: TCP
      port: 3306
      targetPort: 3306
  clusterIP: None